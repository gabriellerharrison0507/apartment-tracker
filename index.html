
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RoomList — Gabby's Move 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #F0FAFA;
    --ink: #0A2525;
    --muted: #4A8080;
    --border: #A8D8D8;
    --white: #FFFFFF;
    --accent: #0ABAB5;
    --accent-light: #C8F0EE;
    --pink: #FF0090;
    --pink-light: #FFD6F0;
    --teal-dark: #008B87;
    --serif: 'DM Serif Display', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--sans);
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* NAV */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }
  .nav-brand {
    font-family: var(--serif);
    font-size: 20px;
    color: var(--ink);
    letter-spacing: -0.3px;
  }
  .nav-brand span { color: var(--pink); font-style: italic; }
  .nav-total {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .nav-total-label { font-size: 12px; color: var(--muted); }
  .nav-total-num {
    font-family: var(--serif);
    font-size: 22px;
    color: var(--pink);
  }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, #6ECEC6 0%, #81D8D0 100%);
    color: var(--white);
    padding: 56px 40px 48px;
    position: relative;
    overflow: hidden;
  }
  .hero::after {
    content: '';
    position: absolute;
    right: -60px;
    top: -60px;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: var(--pink);
    opacity: 0.15;
  }
  .hero-eyebrow {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin-bottom: 10px;
  }
  .hero-title {
    font-family: var(--serif);
    font-size: clamp(32px, 5vw, 52px);
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .hero-title em { color: #F9B8D5; font-style: italic; }
  .hero-sub { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 36px; font-weight: 300; }
  .hero-stats {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
  }
  .hero-stat-num {
    font-family: var(--serif);
    font-size: 32px;
    color: var(--white);
    display: block;
  }
  .hero-stat-label { font-size: 12px; color: rgba(255,255,255,0.4); }

  /* ROOM TABS */
  .room-nav {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    display: flex;
    gap: 0;
    overflow-x: auto;
  }
  .room-tab {
    padding: 16px 24px;
    border: none;
    background: none;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 400;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .room-tab:hover { color: var(--ink); }
  .room-tab.active {
    color: var(--ink);
    border-bottom-color: var(--accent);
    font-weight: 500;
  }
  .room-tab .tab-amount {
    font-size: 11px;
    color: var(--accent);
    font-weight: 500;
  }

  /* MAIN LAYOUT */
  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ROOM HEADER */
  .room-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 28px;
  }
  .room-title {
    font-family: var(--serif);
    font-size: 36px;
    line-height: 1;
    letter-spacing: -0.5px;
  }
  .room-meta { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .room-total-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 22px;
    text-align: right;
    min-width: 140px;
  }
  .room-total-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .room-total-num {
    font-family: var(--serif);
    font-size: 28px;
    color: var(--pink);
    display: block;
    margin-top: 2px;
  }

  /* PROGRESS */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
  }
  .progress-bar {
    flex: 1;
    height: 5px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .progress-label { font-size: 12px; color: var(--muted); white-space: nowrap; }

  /* FILTER */
  .filter-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .filter-btns { display: flex; gap: 4px; }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: var(--sans);
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.12s;
  }
  .filter-btn.active {
    background: var(--ink);
    color: var(--white);
    border-color: var(--ink);
  }
  .items-count { font-size: 13px; color: var(--muted); }

  /* ITEMS */
  .items-list { display: flex; flex-direction: column; gap: 8px; }
  .item-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .item-card:hover { border-color: var(--border); box-shadow: 0 2px 8px rgba(26,158,120,0.08); }
  .item-card.expanded { border-color: var(--accent); }
  .item-card.skipped { opacity: 0.38; }
  .badge-est {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 99px;
    background: #EEF6FF;
    color: #4A7FA5;
    white-space: nowrap;
    font-weight: 400;
  }
  .item-main {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
  }
  .item-check {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: var(--accent);
    flex-shrink: 0;
  }
  .item-name {
    flex: 1;
    font-size: 15px;
    font-weight: 400;
  }
  .badge {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 99px;
    font-weight: 500;
    white-space: nowrap;
  }
  .badge-price {
    background: var(--accent-light);
    color: var(--accent);
  }
  .badge-link {
    background: var(--pink-light);
    color: var(--pink);
    text-decoration: none;
  }
  .btn-details {
    padding: 5px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: var(--sans);
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.12s;
  }
  .btn-details:hover { border-color: var(--accent); color: var(--accent); }
  .btn-details.open { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
  .btn-remove {
    background: none;
    border: none;
    color: #C8BFB5;
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
    padding: 0;
    flex-shrink: 0;
  }
  .btn-remove:hover { color: #E06B6B; }

  /* EXPANDED DETAIL */
  .item-detail {
    padding: 0 18px 16px;
    border-top: 1px solid var(--border);
    padding-top: 16px;
    display: none;
    flex-direction: column;
    gap: 10px;
    animation: fadeIn 0.15s ease;
  }
  .item-detail.open { display: flex; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .detail-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .detail-field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 160px; }
  .detail-field.narrow { flex: 0 0 110px; min-width: 110px; }
  .detail-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }
  .detail-input {
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 13px;
    color: var(--ink);
    background: var(--cream);
    transition: border-color 0.12s;
    width: 100%;
  }
  .detail-input:focus { outline: none; border-color: var(--accent); background: var(--white); }
  .item-note-preview {
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
    padding: 0 18px 10px 50px;
  }

  /* ADD ITEM */
  .add-section {
    margin-top: 16px;
    display: flex;
    gap: 8px;
  }
  .add-input {
    flex: 1;
    padding: 11px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: var(--sans);
    font-size: 14px;
    color: var(--ink);
    background: var(--white);
    transition: border-color 0.12s;
  }
  .add-input:focus { outline: none; border-color: var(--accent); }
  .add-btn {
    padding: 11px 22px;
    background: var(--accent);
    color: var(--white);
    border: none;
    border-radius: 10px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.12s;
  }
  .add-btn:hover { opacity: 0.88; }

  /* FOOTER SUMMARY */
  .summary-grid {
    margin-top: 60px;
    padding-top: 40px;
    border-top: 1px solid var(--border);
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .summary-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .summary-room { font-size: 12px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.07em; }
  .summary-amount {
    font-family: var(--serif);
    font-size: 26px;
    color: var(--ink);
  }
  .summary-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 14px;
  }

  /* OWNED ITEMS */
  .item-card.owned { opacity: 0.45; }
  .badge-owned { background: #E8F5E9; color: #388E3C; }
  .btn-own {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    font-size: 11px; color: var(--muted); cursor: pointer;
    padding: 3px 8px; white-space: nowrap; font-family: var(--sans);
    transition: all 0.12s; flex-shrink: 0;
  }
  .btn-own:hover { border-color: #76C893; color: #388E3C; }
  .btn-own.active { background: #E8F5E9; color: #388E3C; border-color: #76C893; }

  /* RESET BUTTON */
  .btn-reset {
    font-size: 12px; padding: 5px 12px; border-radius: 8px;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); cursor: pointer; font-family: var(--sans);
    transition: all 0.12s;
  }
  .btn-reset:hover { border-color: #E06B6B; color: #E06B6B; }

  /* MOBILE */
  @media (max-width: 640px) {
    nav { padding: 0 16px; height: auto; min-height: 60px; flex-wrap: wrap; gap: 8px; padding-top: 10px; padding-bottom: 10px; }
    .nav-brand { font-size: 17px; }
    .hero { padding: 28px 16px 24px; }
    .hero-title { font-size: 26px; }
    .hero-stats { gap: 16px; flex-wrap: wrap; }
    .hero-stat-num { font-size: 24px; }
    .room-nav { padding: 0 8px; }
    .room-tab { padding: 10px 12px; font-size: 13px; }
    .main { padding: 20px 12px 60px; }
    .room-header { flex-direction: column; }
    .room-total-card { width: 100%; min-width: unset; text-align: left; }
    .filter-row { flex-wrap: wrap; gap: 8px; }
    .item-main { flex-wrap: wrap; }
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
    .add-section { flex-direction: column; }
    .add-btn { width: 100%; }
  }
</style>
</head>

<nav>

        </div>
        <div>

          <div class="nav-total-num" id="grand-total">$0.00</div>
        </div>
      </div>
    </div>
  </div>
</nav>

<div class="hero">

    </div>
    <div>

      <span class="hero-stat-label">est. remaining</span>
    </div>
  </div>
</div>

<div class="room-nav" id="room-nav"></div>

<main class="main">

      </div>

      <div class="room-meta" id="room-meta"></div>
    </div>
    <div class="room-total-card">
      <div style="display:flex;gap:20px;">
        <div>
          <div class="room-total-label">estimated</div>
          <span class="room-total-num" id="room-est" style="font-size:14px;color:var(--muted);">—</span>
        </div>
        <div style="text-align:right;">
          <div class="room-total-label">actual</div>
          <span class="room-total-num" id="room-total">$0</span>
        </div>
      </div>
    </div>
  </div>

  <div class="progress-row">
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    <span class="progress-label" id="prog-label">0% tracked</span>
  </div>

  <div class="filter-row">
    <div class="filter-btns">
      <button class="filter-btn active" id="f-needed" onclick="setFilter('needed')">Still needed</button>
      <button class="filter-btn" id="f-all" onclick="setFilter('all')">All items</button>
    </div>
    <span class="items-count" id="items-count"></span>
  </div>

  <div class="items-list" id="items-list"></div>

  <div class="add-section">
    <input class="add-input" id="new-item" placeholder="Add an item to this room..." onkeydown="if(event.key==='Enter')addItem()" />
    <button class="add-btn" onclick="addItem()">+ Add</button>
  </div>

  <div class="summary-grid" id="summary-grid"></div>
</main>

// Load persisted data from localStorage, fall back to defaults
const SAVED = localStorage.getItem("aptTracker_data");
if (SAVED) { try {
  data = JSON.parse(SAVED);
  // Migration: convert old "Already have" bought items to owned
  ROOMS.forEach(r => { if (!data[r]) return; data[r].forEach(item => {
    if (item.owned === undefined) {
      item.owned = !!(item.bought && item.note && item.note.includes("Already have"));
      if (item.owned) item.bought = false;
    }
  }); });
} catch(e) {} }
const SAVED_ID = localStorage.getItem("aptTracker_nextId");
let nextId = SAVED_ID ? parseInt(SAVED_ID) : 400;

function saveData() {
  localStorage.setItem("aptTracker_data", JSON.stringify(data));
  localStorage.setItem("aptTracker_nextId", String(nextId));
}

let activeRoom = "Kitchen", filterMode = "needed", expandedKey = null;

function pp(p){ const n=parseFloat(String(p).replace(/[^0-9.]/g,"")); return isNaN(n)?0:n; }
function roomTotal(r){ return data[r].filter(i=>i.price).reduce((s,i)=>s+pp(i.price),0); }
function grandTotal(){ return ROOMS.reduce((s,r)=>s+roomTotal(r),0); }
function allItems(){ return ROOMS.flatMap(r=>data[r]); }

function parseEstRange(est){
  if(!est) return {lo:0,hi:0};
  const nums = est.replace(/,/g,"").match(/\d+/g);
  if(!nums||nums.length<2) return {lo:0,hi:0};
  return {lo:parseInt(nums[0]),hi:parseInt(nums[1])};
}
function roomEstRange(r){
  const unbought = data[r].filter(i=>!i.bought&&!i.owned&&!i.price&&i.est);
  const priced = data[r].filter(i=>!i.bought&&!i.owned&&i.price);
  let lo=0,hi=0;
  unbought.forEach(i=>{ const e=parseEstRange(i.est); lo+=e.lo; hi+=e.hi; });
  priced.forEach(i=>{ lo+=pp(i.price); hi+=pp(i.price); });
  return {lo,hi};
}
function grandEstRange(){
  let lo=0,hi=0;
  ROOMS.forEach(r=>{ const e=roomEstRange(r); lo+=e.lo; hi+=e.hi; });
  return {lo,hi};
}

function toggleOwned(r,id){
  const item=data[r].find(i=>i.id===id);
  if(item){item.owned=!item.owned; if(item.owned)item.bought=false; saveData(); renderAll();}
}

function updateItemName(r,id,val){
  const item=data[r].find(i=>i.id===id);
  if(item){item.name=val; saveData();}
}

function resetToDefaults(){
  if(!confirm("Reset all data back to defaults? This will erase all your changes."))return;
  localStorage.removeItem("aptTracker_data");
  localStorage.removeItem("aptTracker_nextId");
  location.reload();
}

function setFilter(f){
  filterMode=f;
  document.getElementById("f-needed").className="filter-btn"+(f==="needed"?" active":"");
  document.getElementById("f-all").className="filter-btn"+(f==="all"?" active":"");
  renderItems();
}

function setRoom(r){ activeRoom=r; expandedKey=null; renderAll(); }

function toggleExpand(key){
  expandedKey=expandedKey===key?null:key;
  renderItems();
}

function toggleBought(r,id){
  const item=data[r].find(i=>i.id===id);
  if(item){item.bought=!item.bought; saveData(); renderAll();}
}

function updateField(r,id,field,val){
  const item=data[r].find(i=>i.id===id);
  if(item){item[field]=val; saveData(); renderTotals(); renderHeroStats();}
}

function removeItem(r,id){
  data[r]=data[r].filter(i=>i.id!==id);
  if(expandedKey===`${r}-${id}`)expandedKey=null;
  saveData(); renderAll();
}

function addItem(){
  const inp=document.getElementById("new-item");
  const name=inp.value.trim(); if(!name)return;
  data[activeRoom].push({id:nextId++,name,est:"",bought:false,url:"",price:"",note:"",options:[]});
  inp.value=""; saveData(); renderAll();
}

function renderRoomNav(){
  document.getElementById("room-nav").innerHTML=ROOMS.map(r=>{
    const t=roomTotal(r);
    const isA=r===activeRoom;
    const theme=ROOM_THEMES[r];
    const activeStyle=isA?`background:${theme.a};color:#fff;border-bottom-color:${theme.a};`:"";
    return `<button class="room-tab${isA?" active":""}" style="${activeStyle}" onclick="setRoom('${r.replace(/'/g,"\\'")}')">
      ${r}
      ${t>0?`<span class="tab-amount" style="${isA?"color:rgba(255,255,255,0.8)":""}"">$${Math.round(t)}</span>`:`<span class="tab-amount" style="opacity:0">$0</span>`}
    </button>`;
  }).join("");
}

function renderRoomHeader(){
  const items=data[activeRoom];
  const bought=items.filter(i=>i.bought);
  const owned=items.filter(i=>i.owned);
  const priced=items.filter(i=>i.price);
  const linked=items.filter(i=>i.url);
  const trackedAll=items.filter(i=>i.url||i.price);
  const prog=items.length?Math.round(trackedAll.length/items.length*100):0;
  const theme=ROOM_THEMES[activeRoom];
  const est=roomEstRange(activeRoom);
  const actual=roomTotal(activeRoom);
  document.getElementById("room-title").textContent=activeRoom;
  document.getElementById("room-theme-swatch").style.background=theme.gradient;
  document.getElementById("room-theme-label").textContent=theme.label;
  document.getElementById("room-meta").textContent=`${items.length} items · ${bought.length} purchased · ${owned.length} already own · ${priced.length} priced · ${linked.length} linked`;
  document.getElementById("room-total").textContent=actual>0?`$${actual.toFixed(2)}`:"$0";
  document.getElementById("room-est").textContent=est.lo>0?`$${est.lo.toLocaleString()}–$${est.hi.toLocaleString()}`:"—";
  document.getElementById("prog-fill").style.width=prog+"%";
  document.getElementById("prog-fill").style.background=theme.a;
  document.getElementById("prog-label").textContent=`${prog}% tracked`;
}

function renderHeroStats(){
  const all=allItems();
  document.getElementById("h-needed").textContent=all.filter(i=>!i.bought&&!i.owned).length;
  document.getElementById("h-priced").textContent=all.filter(i=>i.price).length;
  document.getElementById("h-linked").textContent=all.filter(i=>i.url).length;
  const ge=grandEstRange();
  document.getElementById("h-remaining").textContent=ge.lo>0?`$${ge.lo.toLocaleString()}–$${ge.hi.toLocaleString()}`:"—";
}

function renderTotals(){
  const gt=grandTotal();
  const ge=grandEstRange();
  document.getElementById("grand-total").textContent=`$${gt.toFixed(2)}`;
  document.getElementById("nav-est").textContent=ge.lo>0?`$${ge.lo.toLocaleString()}–$${ge.hi.toLocaleString()}`:"—";
  renderRoomHeader();
  renderRoomNav();
  renderSummary();
}

function addOption(r,id){
  const item=data[r].find(i=>i.id===id);
  if(!item) return;
  item.options.push({label:"New option",url:"",price:"",note:""});
  saveData(); renderItems();
}
function removeOption(r,id,oi){
  const item=data[r].find(i=>i.id===id);
  if(!item) return;
  item.options.splice(oi,1);
  saveData(); renderItems(); renderTotals(); renderHeroStats();
}
function updateOption(r,id,oi,field,val){
  const item=data[r].find(i=>i.id===id);
  if(!item) return;
  item.options[oi][field]=val;
  saveData(); renderTotals(); renderHeroStats();
}

function itemDisplayPrice(item){
  if(item.price) return pp(item.price);
  if(item.options&&item.options.length){
    const prices=item.options.filter(o=>o.price).map(o=>pp(o.price));
    if(prices.length) return Math.min(...prices);
  }
  return 0;
}

function renderItems(){
  const list=document.getElementById("items-list");
  const items=data[activeRoom]
    .filter(i=>filterMode==="all"||(!i.bought&&!i.owned))
    .sort((a,b)=>{ const rank=i=>i.owned?2:i.bought?1:0; return rank(a)-rank(b); });
  document.getElementById("items-count").textContent=`${items.length} item${items.length!==1?"s":""}`;
  if(!items.length){list.innerHTML=`<div class="empty-state">All done in here! 🎉</div>`; return;}
  const theme=ROOM_THEMES[activeRoom];
  list.innerHTML=items.map(item=>{
    const key=`${activeRoom}-${item.id}`;
    const isExp=expandedKey===key;
    const safeUrl=item.url.replace(/"/g,'&quot;');

    const safePrice=item.price.replace(/"/g,'&quot;');
    const opts=item.options||[];
    const optPrices=opts.filter(o=>o.price).map(o=>pp(o.price));
    const priceRange=optPrices.length>1?`$${Math.min(...optPrices).toFixed(0)}–$${Math.max(...optPrices).toFixed(0)}`:
                     optPrices.length===1?`$${optPrices[0].toFixed(2)}`:"";

      const safeOUrl=(o.url||"").replace(/"/g,'&quot;');

        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">

            <label class="detail-label">Price</label>

    }).join("");

    return `<div class="item-card${isExp?" expanded":""}${item.bought?" skipped":""}${item.owned?" owned":""}">
      <div class="item-main">
        <input type="checkbox" class="item-check" ${item.bought?"checked":""} onchange="toggleBought('${activeRoom}',${item.id})" title="Mark as bought" />

        ${opts.length>0&&!item.price?`<span class="badge" style="background:${theme.aLight};color:${theme.a};">${opts.length} option${opts.length>1?"s":""}</span>`:""}

        <div class="summary-room">${r}</div>
      </div>
      <div class="summary-amount">${actual>0?`$${actual.toFixed(2)}`:"—"}</div>
      ${est.lo>0?`<div style="font-size:11px;color:var(--muted);margin-top:2px;">est. $${est.lo.toLocaleString()}–$${est.hi.toLocaleString()}</div>`:""}
      <div class="summary-sub" style="margin-top:4px;">${bought}/${total} bought</div>
    </div>`;
  }).join("");
}

function renderAll(){
  renderRoomNav();
  renderRoomHeader();
  renderItems();
  renderTotals();
  renderHeroStats();
  renderSummary();
}
renderAll();
</script>
</body>
</html>
